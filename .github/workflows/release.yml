name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'Choose rehearse for branch validation or recover for tag-backed publish recovery'
        required: true
        default: rehearse
        type: choice
        options:
          - rehearse
          - recover
      recovery_tag:
        description: 'Existing v* tag to recover'
        required: false
        type: string
      recover_oc_arkive:
        description: 'Recover the oc-arkive npm publish for the requested tag'
        required: false
        default: false
        type: boolean
      recover_github_release:
        description: 'Recover the GitHub Release for the requested tag'
        required: false
        default: false
        type: boolean

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      publish_oc_arkive: ${{ steps.resolve.outputs.publish_oc_arkive }}
      publish_github_release: ${{ steps.resolve.outputs.publish_github_release }}
    steps:
      - name: Resolve release mode
        id: resolve
        env:
          REQUESTED_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.release_mode || '' }}
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.recovery_tag || '' }}
          RECOVER_OC_ARKIVE: ${{ github.event_name == 'workflow_dispatch' && inputs.recover_oc_arkive || false }}
          RECOVER_GITHUB_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.recover_github_release || false }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == 'push' ]]; then
            echo "checkout_ref=${GITHUB_REF}" >> "${GITHUB_OUTPUT}"
            echo "release_tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo 'publish_oc_arkive=true' >> "${GITHUB_OUTPUT}"
            echo 'publish_github_release=true' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${REQUESTED_MODE}" != 'recover' ]]; then
            echo "checkout_ref=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
            echo 'release_tag=' >> "${GITHUB_OUTPUT}"
            echo 'publish_oc_arkive=false' >> "${GITHUB_OUTPUT}"
            echo 'publish_github_release=false' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          requested_tag="${REQUESTED_TAG}"

          if [[ ! "${requested_tag}" =~ ^v ]]; then
            echo 'requested recovery tag must start with v' >&2
            exit 1
          fi

          if [[ "${RECOVER_OC_ARKIVE}" != 'true' && "${RECOVER_GITHUB_RELEASE}" != 'true' ]]; then
            echo 'No recovery targets were selected' >&2
            exit 1
          fi

          git ls-remote --exit-code --refs --tags "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${requested_tag}"

          echo "checkout_ref=refs/tags/${requested_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${requested_tag}" >> "${GITHUB_OUTPUT}"
          echo "publish_oc_arkive=${RECOVER_OC_ARKIVE}" >> "${GITHUB_OUTPUT}"
          echo "publish_github_release=${RECOVER_GITHUB_RELEASE}" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build hive-core
        working-directory: packages/hive-core
        run: bun run build

      - name: Reinstall to link workspace packages
        run: bun install

      - name: Build oc-arkive
        working-directory: packages/opencode-hive
        run: bun run build

      - name: Test hive-core
        working-directory: packages/hive-core
        run: bun test

      - name: Test oc-arkive
        working-directory: packages/opencode-hive
        run: bun test

      - name: Build vscode-arkive
        working-directory: packages/vscode-hive
        run: bun run package

      - name: Test vscode-arkive
        working-directory: packages/vscode-hive
        run: bun test

      - name: Upload oc-arkive npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-oc-arkive
          path: packages/opencode-hive/

      - name: Upload vscode-arkive VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-arkive-vsix
          path: packages/vscode-hive/vscode-arkive.vsix

      - name: Upload release notes artifact
        if: ${{ needs.prepare.outputs.release_tag != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: docs/releases/${{ needs.prepare.outputs.release_tag }}.md

  publish-oc-arkive:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.publish_oc_arkive == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download oc-arkive npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package-oc-arkive
          path: packages/opencode-hive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm publish credentials
        run: node .github/scripts/verify-npm-publish-access.mjs opencode-hive
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}

      - name: Check if already published on npm
        id: npm_check
        working-directory: packages/opencode-hive
        run: |
          pkg=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "${pkg}@${ver}" version 2>/dev/null | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${pkg}@${ver} is already published on npm -- skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}

      - name: Publish to npm
        if: steps.npm_check.outputs.skip != 'true'
        working-directory: packages/opencode-hive
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}

  release:
    needs: [prepare, build, publish-oc-arkive]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.build.result == 'success' &&
      needs.prepare.outputs.publish_github_release == 'true' &&
      ((needs.prepare.outputs.publish_oc_arkive == 'true' && needs.publish-oc-arkive.result == 'success') || (needs.prepare.outputs.publish_oc_arkive != 'true' && needs.publish-oc-arkive.result == 'skipped'))
    permissions:
      contents: write
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: docs/releases/

      - name: Download vscode-arkive VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-arkive-vsix
          path: packages/vscode-hive

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          body_path: docs/releases/${{ needs.prepare.outputs.release_tag }}.md
          files: packages/vscode-hive/vscode-arkive.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
