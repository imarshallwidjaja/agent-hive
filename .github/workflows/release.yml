name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'Choose rehearse for branch validation or recover for tag-backed publish recovery'
        required: true
        default: rehearse
        type: choice
        options:
          - rehearse
          - recover
      recovery_tag:
        description: 'Existing v* tag to recover'
        required: false
        type: string
      recover_npm:
        description: 'Recover the npm publish for the requested tag'
        required: false
        default: false
        type: boolean
      recover_vscode:
        description: 'Recover the VS Code Marketplace publish for the requested tag'
        required: false
        default: false
        type: boolean
      recover_github_release:
        description: 'Recover the GitHub Release for the requested tag'
        required: false
        default: false
        type: boolean

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      publish_npm: ${{ steps.resolve.outputs.publish_npm }}
      publish_vscode: ${{ steps.resolve.outputs.publish_vscode }}
      publish_github_release: ${{ steps.resolve.outputs.publish_github_release }}
    steps:
      - name: Resolve release mode
        id: resolve
        env:
          REQUESTED_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.release_mode || '' }}
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.recovery_tag || '' }}
          RECOVER_NPM: ${{ github.event_name == 'workflow_dispatch' && inputs.recover_npm || false }}
          RECOVER_VSCODE: ${{ github.event_name == 'workflow_dispatch' && inputs.recover_vscode || false }}
          RECOVER_GITHUB_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.recover_github_release || false }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == 'push' ]]; then
            echo "checkout_ref=${GITHUB_REF}" >> "${GITHUB_OUTPUT}"
            echo "release_tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo 'publish_npm=true' >> "${GITHUB_OUTPUT}"
            echo 'publish_vscode=true' >> "${GITHUB_OUTPUT}"
            echo 'publish_github_release=true' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${REQUESTED_MODE}" != 'recover' ]]; then
            echo "checkout_ref=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
            echo 'release_tag=' >> "${GITHUB_OUTPUT}"
            echo 'publish_npm=false' >> "${GITHUB_OUTPUT}"
            echo 'publish_vscode=false' >> "${GITHUB_OUTPUT}"
            echo 'publish_github_release=false' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          requested_tag="${REQUESTED_TAG}"

          if [[ ! "${requested_tag}" =~ ^v ]]; then
            echo 'requested recovery tag must start with v' >&2
            exit 1
          fi

          if [[ "${RECOVER_NPM}" != 'true' && "${RECOVER_VSCODE}" != 'true' && "${RECOVER_GITHUB_RELEASE}" != 'true' ]]; then
            echo 'No recovery targets were selected' >&2
            exit 1
          fi

          git ls-remote --exit-code --refs --tags "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${requested_tag}"

          echo "checkout_ref=refs/tags/${requested_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${requested_tag}" >> "${GITHUB_OUTPUT}"
          echo "publish_npm=${RECOVER_NPM}" >> "${GITHUB_OUTPUT}"
          echo "publish_vscode=${RECOVER_VSCODE}" >> "${GITHUB_OUTPUT}"
          echo "publish_github_release=${RECOVER_GITHUB_RELEASE}" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build hive-core
        working-directory: packages/hive-core
        run: bun run build

      - name: Reinstall to link workspace packages
        run: bun install

      - name: Build opencode-hive
        working-directory: packages/opencode-hive
        run: bun run build

      - name: Build vscode-hive
        working-directory: packages/vscode-hive
        run: bun run build

      - name: Test hive-core
        working-directory: packages/hive-core
        run: bun test

      - name: Test opencode-hive
        working-directory: packages/opencode-hive
        run: bun test

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: packages/vscode-hive/*.vsix

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: packages/opencode-hive/

      - name: Upload release notes artifact
        if: ${{ needs.prepare.outputs.release_tag != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: docs/releases/${{ needs.prepare.outputs.release_tag }}.md

  publish-npm:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.publish_npm == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: packages/opencode-hive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm publish credentials
        run: node .github/scripts/verify-npm-publish-access.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}

      - name: Publish to npm
        working-directory: packages/opencode-hive
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}

  publish-vscode:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.publish_vscode == 'true'
    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Verify VS Code Marketplace credentials
        run: npx @vscode/vsce verify-pat tctinh
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  release:
    needs: [prepare, build, publish-npm, publish-vscode]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.build.result == 'success' &&
      needs.prepare.outputs.publish_github_release == 'true' &&
      ((needs.prepare.outputs.publish_npm == 'true' && needs.publish-npm.result == 'success') || (needs.prepare.outputs.publish_npm != 'true' && needs.publish-npm.result == 'skipped')) &&
      ((needs.prepare.outputs.publish_vscode == 'true' && needs.publish-vscode.result == 'success') || (needs.prepare.outputs.publish_vscode != 'true' && needs.publish-vscode.result == 'skipped'))
    permissions:
      contents: write
    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix
          path: artifacts/

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: docs/releases/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          files: artifacts/*.vsix
          body_path: docs/releases/${{ needs.prepare.outputs.release_tag }}.md
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
